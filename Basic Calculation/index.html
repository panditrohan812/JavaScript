<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <h1>⚡ Basic Calculator</h1>

      <input type="number" id="num1" placeholder="Enter Number 1" />
      <input type="number" id="num2" placeholder="Enter Number 2" />

      <select id="operation">
        <option value="add">Addition</option>
        <option value="sub">Subtraction</option>
        <option value="mul">Multiplication</option>
        <option value="div">Division</option>
        <option value="mod">Modulus</option>
        <option value="pow">Power</option>
        <option value="square">Square</option>
        <option value="cube">Cube</option>
        <option value="percentage">Percentage</option>
        <option value="average">Average</option>
        <option value="max">Maximum</option>
        <option value="min">Minimum</option>
        <option value="inc">Increment</option>
        <option value="dec">Decrement</option>
        <option value="double">Double</option>
        <option value="half">Half</option>
        <option value="discount">Discount Price</option>
        <option value="gst">Add GST (18%)</option>
        <option value="area">Rectangle Area</option>
        <option value="perimeter">Rectangle Parameter</option>
      </select>

      <button onclick="calculate()">Calculate</button>
      <div id="result">Result :</div>
    </div>

    <script src="1.js"></script>
  </body>
</html>
