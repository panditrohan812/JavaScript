<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quiz Application</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div
      class="container d-flex justify-content-center align-items-center min-vh-100"
    >
      <div class="quiz-box">
        <h2 class="text-center mb-4">🎓 Quiz Application</h2>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <span id="questionNumber"> Question 1 / 10 </span>

          <span id="timer" class="badge bg-danger fs-6"> ⏳ 15s </span>
        </div>

        <div class="progress mb-4">
          <div
            id="progressBar"
            class="progress-bar progress-bar-striped progress-bar-animated bg-success"
            style="width: 10%"
          ></div>
        </div>

        <h4 id="question" class="text-center mb-4">Question Here</h4>

        <div id="options"></div>

        <button id="nextBtn" class="btn btn-primary btn-lg w-100 mt-4">
          Next Question
        </button>
      </div>
    </div>

    <script src="Quiz.js"></script>
  </body>
</html>
